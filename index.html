// UTILITIES
// ═══════════════════════════════════════════════════════════
function slugify(s){ return String(s).toLowerCase().replace(/\s+/g,'-').replace(/[^\w-]/g,'').slice(0,60) }
function getWeek(wid){ return WEEKS.find(w=>w.id===wid) }
function getEx(week,type){ return type==='inClass' ? week.inClass : week.homework }

function countQs(ex){
  if(!ex) return 0
  if(ex.formItems) return ex.formItems.filter(i=>i.type==='input').length
  if(ex.sections) return ex.sections.reduce((a,s)=>a+s.items.length,0)
  return 0
}
function buildEmptyAnswers(ex){
  const a={}
  if(!ex) return a
  if(ex.formItems) ex.formItems.forEach(it=>{ if(it.type==='input') a[it.num]='' })
  if(ex.sections) ex.sections.forEach(s=>s.items.forEach(i=>{ a[i.num]='' }))
  return a
}
function buildEmptyRev(ex){
  const r={marks:{},comments:{},highlights:[]}
  if(!ex) return r
  if(ex.formItems) ex.formItems.forEach(it=>{ if(it.type==='input'){ r.marks[it.num]=null; r.comments[it.num]='' }})
  if(ex.sections) ex.sections.forEach(s=>s.items.forEach(i=>{ r.marks[i.num]=null; r.comments[i.num]='' }))
  return r
}

async function dbUpsertStudent(name, code){
  const id = slugify(name+'-'+code)
  const { error } = await db.from('students').upsert({id,name,class_code:code},{onConflict:'id',ignoreDuplicates:true})
  if(error) throw error
  return id
}
async function dbLoadStudentData(studentId){
  const [subsRes, progRes] = await Promise.all([
    db.from('submissions').select('week_id,sub_type,answers,submitted_at').eq('student_id',studentId),
    db.from('theory_progress').select('week_id,completed').eq('student_id',studentId)
  ])
  const subs={}
  ;(subsRes.data||[]).forEach(r=>{ subs[r.week_id+'-'+r.sub_type]={answers:r.answers,submittedAt:r.submitted_at} })
  const prog={}
  ;(progRes.data||[]).forEach(r=>{ prog[r.week_id]=r.completed })
  return {subs,prog}
}
async function dbSubmit(studentId,weekId,subType,answers){
  const { error } = await db.from('submissions').upsert(
    {student_id:studentId,week_id:weekId,sub_type:subType,answers,submitted_at:new Date().toISOString()},
    {onConflict:'student_id,week_id,sub_type'}
  )
  if(error) throw error
}
async function dbSaveTheory(studentId,weekId,completed){
  const { error } = await db.from('theory_progress').upsert(
    {student_id:studentId,week_id:weekId,completed,updated_at:new Date().toISOString()},
    {onConflict:'student_id,week_id'}
  )
  if(error) throw error
}
async function dbLoadAllStudents(){
  const { data, error } = await db.from('students').select('*').order('created_at',{ascending:false})
  if(error) throw error
  return data||[]
}
async function dbLoadStudentSubs(studentId){
  const { data, error } = await db.from('submissions').select('week_id,sub_type,answers').eq('student_id',studentId)
  if(error) throw error
  const subs={}
  ;(data||[]).forEach(r=>{ subs[r.week_id+'-'+r.sub_type]={answers:r.answers} })
  return subs
}
async function dbLoadReview(studentId,weekId,subType){
  const { data } = await db.from('reviews').select('*').eq('student_id',studentId).eq('week_id',weekId).eq('sub_type',subType).maybeSingle()
  return data
}
async function dbSaveReview(studentId,weekId,subType,rev){
  const { error } = await db.from('reviews').upsert(
    {student_id:studentId,week_id:weekId,sub_type:subType,marks:rev.marks,comments:rev.comments,highlights:rev.highlights,updated_at:new Date().toISOString()},
    {onConflict:'student_id,week_id,sub_type'}
  )
  if(error) throw error
}

let _toastTimer=null
function toast(msg,type='success'){
  if(_toastTimer) clearTimeout(_toastTimer)
  const el=document.getElementById('toast-area')
  const bg=type==='error'?'#fee2e2':'#d1fae5'
  const tc=type==='error'?'#991b1b':'#065f46'
  el.innerHTML=`<div class="toast" style="background:${bg};color:${tc}">${msg}</div>`
  _toastTimer=setTimeout(()=>{ el.innerHTML='' },3400)
}

function passageHTML(paras, highlights, teacher){
  return paras.map((p,i)=>{
    const hl = highlights&&highlights.includes(i)
    const style=`font-size:13.5px;line-height:1.85;padding:7px 9px;border-radius:7px;margin-bottom:8px;${teacher?'cursor:pointer;':''};background:${hl?'#fffde6':'transparent'};border:${hl?'0.5px solid #f0d000':'0.5px solid transparent'}`
    const onclick=teacher?`onclick="toggleH(${i})"`:''
    return `<div ${onclick} style="${style}">${p}</div>`
  }).join('')
}

function renderSection(sec, answers, submitted, role){
  let body=''
  if(sec.type==='gap-fill'){
    const rows=sec.items.map(item=>`
      <div style="font-size:13.5px;line-height:2.2;color:#1a1a1a;margin-bottom:4px">
        <span style="font-weight:500;color:#888;margin-right:4px">${item.num}.</span>${item.before}
        <input class="form-input" value="${(answers[item.num]||'').replace(/"/g,'&quot;')}"
          ${submitted?'disabled':''}
          oninput="setAns('${role==='ic'?'IC':'HW'}',${item.num},this.value)"
          style="width:120px" placeholder="${item.num}">
        ${item.after}
      </div>`).join('')
    body=`<div style="background:#fafaf7;border:0.5px solid #ebe8df;border-radius:10px;padding:14px 16px">
      ${sec.noteTitle?`<p style="font-size:12.5px;font-weight:500;margin-bottom:12px">${sec.noteTitle}</p>`:''}${rows}</div>`
  }
  if(sec.type==='tfng'){
    body=sec.items.map(item=>`
      <div style="margin-bottom:14px;padding-bottom:14px;border-bottom:0.5px solid #f0ede6">
        <p style="font-size:13.5px;color:#1a1a1a;margin-bottom:8px;line-height:1.6"><span style="font-weight:500;color:#888;margin-right:5px">${item.num}.</span>${item.statement}</p>
        <div style="display:flex;gap:7px;flex-wrap:wrap">
          ${TFNG.map(opt=>`<button onclick="setAns('${role==='ic'?'IC':'HW'}',${item.num},'${opt}')" ${submitted?'disabled':''} style="padding:5px 14px;border-radius:20px;font-size:12px;font-weight:500;border:none;font-family:inherit;cursor:${submitted?'default':'pointer'};background:${answers[item.num]===opt?'#1a3a2e':'#f0ede6'};color:${answers[item.num]===opt?'#fff':'#4a4a4a'}">${opt}</button>`).join('')}
        </div>
      </div>`).join('')
  }
  if(sec.type==='mcq'){
    body=sec.items.map(item=>`
      <div style="margin-bottom:18px;padding-bottom:18px;border-bottom:0.5px solid #f0ede6">
        <p style="font-size:13.5px;font-weight:500;color:#1a1a1a;margin-bottom:10px;line-height:1.6"><span style="color:#888;margin-right:5px">${item.num}.</span>${item.question}</p>
        ${item.options.map(opt=>`
          <div onclick="${submitted?'':(`setAns('${role==='ic'?'IC':'HW'}',${item.num},'${opt.l}')`)}" style="display:flex;gap:10px;padding:8px 11px;border-radius:8px;margin-bottom:5px;cursor:${submitted?'default':'pointer'};background:${answers[item.num]===opt.l?'#e6f1ec':'transparent'};border:${answers[item.num]===opt.l?'0.5px solid #1a3a2e':'0.5px solid transparent'}">
            <span style="font-weight:500;font-size:13px;min-width:18px;color:${answers[item.num]===opt.l?'#1a3a2e':'#888'}">${opt.l}</span>
            <span style="font-size:13.5px;color:#1a1a1a;line-height:1.6">${opt.t}</span>
          </div>`).join('')}
      </div>`).join('')
  }
  return `<div class="card" style="margin-bottom:14px">
    <p class="label" style="margin-bottom:4px">${sec.title}</p>
    <p style="font-size:12.5px;color:#555;font-style:italic;margin-bottom:16px;line-height:1.6">${sec.instruction}</p>
    ${body}
  </div>`
}

function renderFormItems(items, answers, submitted, role){
  return items.map(it=>{
    if(it.type==='section'){
      return `<div style="margin:${it.isMain?'0':'18px'} 0 12px;${it.isMain?'border-bottom:1px solid #e2dfd6;padding-bottom:8px':''}">
        <${it.isMain?'h2':'h3'} style="font-size:${it.isMain?'17':'14'}px;font-weight:${it.isMain?'500':'700'};color:#1a3a2e">${it.text}</${it.isMain?'h2':'h3'}>
      </div>`
    }
    if(it.type==='static'){
      const pl=it.deep?'36px':it.indent?'20px':'0'
      return `<div style="display:flex;align-items:baseline;gap:8px;font-size:13.5px;line-height:2;flex-wrap:wrap;padding-left:${pl}">
        <span style="font-weight:500;color:#666;min-width:110px">${it.label}</span>
        <span>${it.value||''}</span>
      </div>`
    }
    if(it.type==='input'){
      const pl=it.deep?'36px':it.indent?'20px':'0'
      return `<div style="display:flex;align-items:center;gap:8px;font-size:13.5px;line-height:2.2;flex-wrap:wrap;padding-left:${pl}">
        ${it.prefix?`<span style="color:#1a1a1a">${it.prefix}</span>`:''}
        <span class="form-num">${it.num}</span>
        <input class="form-input" value="${(answers[it.num]||'').replace(/"/g,'&quot;')}"
          ${submitted?'disabled':''}
          oninput="setAns('${role==='ic'?'IC':'HW'}',${it.num},this.value)"
          style="width:140px">
        ${it.suffix?`<span style="color:#1a1a1a">${it.suffix}</span>`:''}
      </div>`
    }
    return ''
  }).join('')
}

  const total=countQs(ex), filled=Object.values(answers).filter(v=>v&&String(v).trim()).length
  const subBar=`<div style="background:#fff;border-bottom:0.5px solid #e2dfd6;padding:10px 20px;display:flex;align-items:center;gap:14px;position:sticky;top:54px;z-index:8">

    mainContent=`<div style="max-width:780px;margin:0 auto;padding:18px 16px">
      <div class="audio-bar" style="margin-bottom:16px;position:sticky;top:120px;z-index:5">

  return subBar+mainContent

      </div>
      ${rev.marks[num]==='wrong'&&answer?`<p style="font-size:12px;color:#0f6e56;margin-bottom:7px">Đáp án đúng: <strong>${answer}</strong></p>`:''}

    leftPanel=`<div class="card" style="height:fit-content;position:sticky;top:120px;max-height:calc(100vh-140px);overflow-y:auto">

    rightPanel=ex.sections.map(sec=>`<div class="card" style="margin-bottom:14px">
      <p class="label" style="margin-bottom:14px">${sec.title}</p>
      ${sec.items.map(item=>revItem(item.num,item.statement||(item.before+' ___ '+item.after)||item.question,item.answer)).join('')}
    </div>`).join('')
  } else if(ex&&ex.formItems){
    const inputs=ex.formItems.filter(i=>i.type==='input')
    leftPanel=`<div class="card" style="height:fit-content;position:sticky;top:120px">
      <p class="label" style="margin-bottom:4px">🎧 Audio — ${ex.formTitle}</p>
      <audio controls preload="metadata" style="width:100%;margin:12px 0">
        <source src="${ex.audioUrl}" type="audio/mpeg">
      </audio>
      <p style="font-size:12.5px;color:#666;line-height:1.6">Mở audio và nghe lại cùng học viên để chữa từng câu.</p>
    </div>`
    rightPanel=`<div class="card"><p class="label" style="margin-bottom:14px">Form: ${ex.formTitle}</p>
      ${inputs.map(it=>revItem(it.num,(it.prefix||'')+' ___ '+(it.suffix||''),it.answer)).join('')}
    </div>`
  }

  return `<div style="min-height:100vh">${hd}
    <div style="display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:16px;max-width:1100px;margin:0 auto;padding:18px 16px">
      ${leftPanel}
      <div>${rightPanel}</div>
    </div>
  </div>`
}

function viewLoading(){
  return `<div class="spinner-wrap"><div class="spinner"></div></div>`
}

// ═══════════════════════════════════════════════════════════
// MAIN RENDER
// ═══════════════════════════════════════════════════════════
function render(){
  const root=document.getElementById('root')
  if(S.loading){ root.innerHTML=viewLoading(); return }
  if(S.view==='login')      root.innerHTML=viewLogin()
  else if(S.view==='s-home') root.innerHTML=viewStudentHome()
  else if(S.view==='week')   root.innerHTML=viewWeekDetail()
  else if(S.view==='t-home') root.innerHTML=viewTeacherHome()
  else if(S.view==='t-rev')  root.innerHTML=viewTeacherReview()
}

// ═══════════════════════════════════════════════════════════
// ACTIONS
// ═══════════════════════════════════════════════════════════
async function doLogin(){
  const name=document.getElementById('ln')?.value?.trim()
  const code=document.getElementById('lc')?.value?.trim()
  const errEl=document.getElementById('lerr')
  if(!name||!code){ if(errEl){errEl.textContent='Vui lòng nhập đầy đủ.';errEl.style.display='block'} return }
  if(errEl) errEl.style.display='none'
  const btn=document.getElementById('login-btn')
  if(btn){ btn.textContent='Đang xử lý...'; btn.disabled=true }

  try{
    if(code===TEACHER_PASS){
      const students=await dbLoadAllStudents()
      set({view:'t-home',user:{role:'teacher',name:'Giáo viên',id:'teacher'},students})
      return
    }
    const studentId=await dbUpsertStudent(name,code)
    const {subs,prog}=await dbLoadStudentData(studentId)
    const user={role:'student',name,id:studentId}
    set({view:'s-home',user,subs,prog})
  } catch(e){
    toast('Lỗi kết nối. Kiểm tra mạng và thử lại.','error')
    if(btn){ btn.textContent='Vào học →'; btn.disabled=false }
  }
}

function doLogout(){
  set({view:'login',user:null,subs:{},prog:{},students:[],selStudent:null,selWid:null,
    activeTab:'theory',ansIC:{},ansHW:{},submittedIC:false,submittedHW:false,
    rev:{marks:{},comments:{},highlights:[]},loading:false})
}

function doPickWeek(wid){
  const week=getWeek(wid)
  if(!week||!week.live) return
  const ic=S.subs[wid+'-inClass'], hw=S.subs[wid+'-homework']
  set({
    view:'week', selWid:wid, activeTab:'theory',
    ansIC:ic?{...ic.answers}:buildEmptyAnswers(week.inClass),
    ansHW:hw?{...hw.answers}:buildEmptyAnswers(week.homework),
    submittedIC:!!ic, submittedHW:!!hw, confirmType:null
  })
}

function setTab(tab){ set({activeTab:tab}) }

function setAns(which,n,v){
  if(which==='IC') set(p=>({ansIC:{...p.ansIC,[n]:v}}))
  else set(p=>({ansHW:{...p.ansHW,[n]:v}}))
}

function trySubmit(type){
  const week=getWeek(S.selWid)
  const ex=getEx(week,type)
  const total=countQs(ex)
  const answers=type==='inClass'?S.ansIC:S.ansHW
  const filled=Object.values(answers).filter(v=>v&&String(v).trim()).length
  if(filled<total){ toast(`Còn ${total-filled} câu chưa trả lời.`,'error'); return }
  set({confirmType:type})
}

async function doSubmit(){
  const type=S.confirmType, wid=S.selWid
  const answers=type==='inClass'?S.ansIC:S.ansHW
  try{
    await dbSubmit(S.user.id,wid,type,answers)
    const updated={...S.subs,[wid+'-'+type]:{answers:{...answers}}}
    const patch={subs:updated,confirmType:null}
    if(type==='inClass') patch.submittedIC=true
    else patch.submittedHW=true
    set(patch)
    toast('Nộp bài thành công! 🎉')
  } catch(e){
    toast('Lỗi khi nộp bài. Thử lại.','error')
    set({confirmType:null})
  }
}

async function markTheory(wid){
  const next=!S.prog[wid]
  try{
    await dbSaveTheory(S.user.id,wid,next)
    set(p=>({prog:{...p.prog,[wid]:next}}))
    toast(next?'Đã đánh dấu hoàn thành lý thuyết':'Đã bỏ đánh dấu')
  } catch(e){ toast('Lỗi khi lưu.','error') }
}

async function doOpenReview(studentId,wid,type){
  set({loading:true})
  try{
    const student=S.students.find(s=>s.id===studentId)||{id:studentId,name:'Học viên',class_code:''}
    const [subs, savedRev]=await Promise.all([
      dbLoadStudentSubs(studentId),
      dbLoadReview(studentId,wid,type)
    ])
    const week=getWeek(wid)
    const ex=getEx(week,type)
    const initRev=buildEmptyRev(ex)
    if(savedRev){
      if(savedRev.marks) Object.assign(initRev.marks,savedRev.marks)
      if(savedRev.comments) Object.assign(initRev.comments,savedRev.comments)
      if(savedRev.highlights) initRev.highlights=savedRev.highlights
    }
    set({view:'t-rev',selStudent:student,selWid:wid,revType:type,subs,rev:initRev,loading:false})
  } catch(e){
    toast('Lỗi tải dữ liệu.','error')
    set({loading:false})
  }
}

async function switchRevType(newType){
  set({loading:true})
  try{
    const savedRev=await dbLoadReview(S.selStudent.id,S.selWid,newType)
    const week=getWeek(S.selWid)
    const ex=getEx(week,newType)
    const initRev=buildEmptyRev(ex)
    if(savedRev){
      if(savedRev.marks) Object.assign(initRev.marks,savedRev.marks)
      if(savedRev.comments) Object.assign(initRev.comments,savedRev.comments)
      if(savedRev.highlights) initRev.highlights=savedRev.highlights
    }
    set({revType:newType,rev:initRev,loading:false})
  } catch(e){ set({loading:false}) }
}

async function backToTeacher(){
  set({loading:true})
  try{
    const students=await dbLoadAllStudents()
    set({view:'t-home',students,selStudent:null,selWid:null,loading:false})
  } catch(e){ set({loading:false}) }
}

function toggleH(i){
  set(p=>({rev:{...p.rev,highlights:p.rev.highlights.includes(i)?p.rev.highlights.filter(x=>x!==i):[...p.rev.highlights,i]}}))
}
function setMark(n,v){ set(p=>({rev:{...p.rev,marks:{...p.rev.marks,[n]:p.rev.marks[n]===v?null:v}}})) }
function setComment(n,v){ set(p=>({rev:{...p.rev,comments:{...p.rev.comments,[n]:v}}})) }

async function doSaveReview(){
  try{
    await dbSaveReview(S.selStudent.id,S.selWid,S.revType,S.rev)
    toast('Đã lưu nhận xét!')
  } catch(e){ toast('Lỗi khi lưu.','error') }
}

// ═══════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════
document.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&S.view==='login') doLogin()
})

render()
</script>
</body>
</html>
