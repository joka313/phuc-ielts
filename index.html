<style>
  :root {

  *  { box-sizing: border-box; }

  .btn       { @apply inline-flex items-center justify-center gap-1.5 px-3.5 py-2 rounded-lg border border-chalk bg-white text-[13px] font-medium text-ink hover:bg-bone hover:border-stone/40 transition; }
  .btn-dark  { @apply inline-flex items-center justify-center gap-1.5 px-3.5 py-2 rounded-lg bg-forest text-white text-[13px] font-medium hover:bg-forest/90 transition disabled:opacity-50 disabled:cursor-not-allowed; }
  .btn-green { @apply inline-flex items-center justify-center gap-1.5 px-3.5 py-2 rounded-lg bg-moss text-white text-[13px] font-medium hover:bg-moss/90 transition; }
  .btn-ghost { @apply inline-flex items-center justify-center gap-1.5 px-3 py-1.5 rounded-md text-[13px] font-medium text-stone hover:bg-mist hover:text-ink transition; }
  .btn-icon  { @apply inline-flex items-center justify-center w-8 h-8 rounded-md border border-chalk bg-white hover:bg-bone transition; }
  .card { @apply bg-white rounded-xl border border-chalk shadow-card; }
  .lbl       { @apply text-[10.5px] font-semibold tracking-[0.08em] uppercase text-moss; }
  .lbl-amber { @apply text-[10.5px] font-semibold tracking-[0.08em] uppercase text-amber; }
  .lbl-mute  { @apply text-[10.5px] font-semibold tracking-[0.08em] uppercase text-stone; }

  .seg-wrap { @apply inline-flex items-center bg-mist rounded-full p-1 shadow-inner; }
  .seg      { @apply px-4 sm:px-5 py-2 rounded-full text-[13px] font-medium text-stone hover:text-ink transition cursor-pointer flex items-center gap-1.5; }
  .seg.act  { @apply bg-white text-forest shadow-card; }
  .seg.act .seg-dot { @apply w-1.5 h-1.5 rounded-full bg-moss; }
  /* Highlight colors */
  mark.h-yellow{ background:var(--hl-yellow); border-bottom:1.5px solid var(--hl-yellow-bd); padding:0 1px; border-radius:2px; }
  mark.h-green { background:var(--hl-green);  border-bottom:1.5px solid var(--hl-green-bd);  padding:0 1px; border-radius:2px; }
  mark.h-blue  { background:var(--hl-blue);   border-bottom:1.5px solid var(--hl-blue-bd);   padding:0 1px; border-radius:2px; }
  mark.h-pink  { background:var(--hl-pink);   border-bottom:1.5px solid var(--hl-pink-bd);   padding:0 1px; border-radius:2px; }
  mark.h-orange{ background:var(--hl-orange); border-bottom:1.5px solid var(--hl-orange-bd); padding:0 1px; border-radius:2px; }
  mark[data-hid]{ cursor:pointer; }
  mark[data-hid]:hover{ filter:brightness(0.96); }
  .selectable { user-select:text; }
  .skel { background:linear-gradient(90deg,#ececec 0%,#f5f5f5 50%,#ececec 100%); background-size:200% 100%; animation:skel 1.4s infinite; border-radius:6px; }
  @keyframes skel { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
  .spinner { width:24px; height:24px; border:2.5px solid #e2dfd6; border-top-color:#1a3a2e; border-radius:50%; animation:spin .7s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg) } }
  .toast { @apply px-4 py-2.5 rounded-lg text-[13px] font-medium shadow-float; }
  .modal-bg { position:fixed; inset:0; background:rgba(15,20,17,0.5); backdrop-filter:blur(2px); display:flex; align-items:center; justify-content:center; z-index:200; padding:1rem; }
  .hl-toolbar { position:absolute; z-index:300; @apply bg-white rounded-lg shadow-float border border-chalk px-2 py-1.5 flex items-center gap-1; }
  .hl-swatch { width:22px; height:22px; border-radius:6px; cursor:pointer; transition:transform .12s; border:1.5px solid rgba(0,0,0,0.08); }
  .hl-swatch:hover { transform:scale(1.12); }
  .pane-scroll { overflow-y:auto; scrollbar-width:thin; scrollbar-color:#cdc8b8 transparent; }
  .pane-scroll::-webkit-scrollbar { width:8px; }
  .pane-scroll::-webkit-scrollbar-thumb { background:#cdc8b8; border-radius:4px; }
  .q-anchor { scroll-margin-top:140px; }
  .chip-correct { @apply inline-flex items-center gap-1 px-2 py-0.5 rounded-md bg-emerald-50 text-emerald-700 text-[12px] font-semibold; }
  .chip-wrong   { @apply inline-flex items-center gap-1 px-2 py-0.5 rounded-md bg-rose-50 text-rose-700 text-[12px] font-semibold; }
  .chip-empty   { @apply inline-flex items-center gap-1 px-2 py-0.5 rounded-md bg-stone-100 text-stone-500 text-[12px] font-medium; }
  .fade-in { animation:fadeIn .25s ease-out; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }
  /* IELTS Mock Test exam shell */
  .exam-shell  { background:#e9ecef; min-height:100vh; }
  .exam-header { background:#3d4453; color:#fff; padding:8px 16px; display:flex; align-items:center; gap:14px; font-size:13px; }
  .exam-header .ielts-logo { color:#e74c3c; font-weight:700; letter-spacing:.04em; font-size:15px; }
  .exam-strip  { background:#fff; border-bottom:1px solid #d6d9de; padding:10px 18px; }
  .exam-foot   { background:#454c5b; color:#fff; padding:8px 14px; display:flex; align-items:center; gap:10px; }
  .exam-pill   { display:inline-flex; align-items:center; justify-content:center; min-width:26px; height:24px; padding:0 8px; border-radius:4px; background:#fff; color:#3d4453; font-size:12px; font-weight:600; cursor:pointer; }
  .exam-pill.act { background:#fff; color:#3d4453; box-shadow:inset 0 -3px 0 #1a3a2e; }
  .exam-pill.done{ background:#dff5e6; color:#0f6e56; }
  .exam-arrow  { width:32px; height:28px; border-radius:4px; background:#fff; color:#3d4453; display:inline-flex; align-items:center; justify-content:center; font-size:14px; cursor:pointer; }
  .exam-check  { background:#0f6e56; color:#fff; width:32px; height:28px; border-radius:4px; display:inline-flex; align-items:center; justify-content:center; cursor:pointer; }
  /* Selected answer "thanh xanh" full-width style */
  .ans-row    { @apply flex items-start gap-2.5 px-3 py-2 rounded-md cursor-pointer transition; }
  .ans-row:hover{ background:#f4f6f8; }
  .ans-row.sel{ background:var(--hl-blue); border-left:3px solid var(--hl-blue-bd); padding-left:9px; }

/* =====================================================================
   UTILITIES
   ===================================================================== */
const esc = s => String(s ?? '').replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]))
const slugify = s => String(s).toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/\s+/g,'-').replace(/[^\w-]/g,'').slice(0,60)
const getWeek = wid => WEEKS.find(w => w.id === wid)
const getEx   = (week, type) => type === 'inClass' ? week.inClass : week.homework
const norm    = s => String(s ?? '').trim().toLowerCase().replace(/\s+/g,' ')

function listAllItems(ex){
  const out = []
  if (!ex) return out
  if (ex.formItems){
    ex.formItems.forEach(it => {
      if (it.type === 'input') out.push({ num:it.num, kind:'fill', answer:it.answer, explain:it.explain, qText:`${it.prefix||''} ___ ${it.suffix||''}`.trim() })
    })
  }
  if (ex.sections){
    ex.sections.forEach(sec => {
      if (sec.type === 'mcq-multi'){
        out.push({ nums: sec.nums, kind:'mcq-multi', answers: sec.answers, pickN: sec.pickN, explain: sec.explain, qText: sec.instruction, options: sec.options })
      } else {
        sec.items.forEach(it => {
          const kind = sec.type === 'tfng' ? 'tfng' : sec.type === 'mcq' ? 'mcq' : 'fill'
          out.push({ num: it.num, kind, answer: it.answer, explain: it.explain,
            qText: it.statement || it.question || `${it.before||''} ___ ${it.after||''}`.trim(),
            options: it.options })
        })
      }
    })
  }
  return out
}

function countQs(ex){
  return listAllItems(ex).reduce((acc, it) => acc + (it.kind === 'mcq-multi' ? it.nums.length : 1), 0)
}
function buildEmptyAnswers(ex){
  const a = {}
  listAllItems(ex).forEach(it => {
    if (it.kind === 'mcq-multi') it.nums.forEach(n => a[n] = '')
    else a[it.num] = ''
  })
  return a
}
function isAnswerCorrect(item, ans){
  if (item.kind === 'mcq-multi'){
    const got = item.nums.map(n => norm(ans[n])).filter(Boolean).sort()
    const want = item.answers.map(norm).sort()
    if (got.length !== want.length) return false
    return got.every((g,i) => g === want[i])
  }
  const a = norm(ans[item.num])
  if (!a) return false
  if (Array.isArray(item.answer)) return item.answer.some(x => norm(x) === a)
  return norm(item.answer) === a
}
function autoGrade(ex, answers, overrideCorrect = {}){
  const marks = {}
  let score = 0, total = 0
  listAllItems(ex).forEach(item => {
    if (item.kind === 'mcq-multi'){
      total += item.nums.length
      const itemEff = overrideCorrect[item.nums.join(',')]
        ? { ...item, answers: String(overrideCorrect[item.nums.join(',')]).split(/[, ]+/).filter(Boolean) }
        : item
      const ok = isAnswerCorrect(itemEff, answers)
      item.nums.forEach(n => marks[n] = ok ? 'correct' : 'wrong')
      if (ok) score += item.nums.length
    } else {
      total += 1
      const itemEff = overrideCorrect[item.num] ? { ...item, answer: overrideCorrect[item.num] } : item
      const ok = isAnswerCorrect(itemEff, answers)
      marks[item.num] = ok ? 'correct' : 'wrong'
      if (ok) score += 1
    }
  })
  return { marks, score, total }
}

let _toastTimer = null
function toast(msg, type='success'){
  if (_toastTimer) clearTimeout(_toastTimer)
  const el = document.getElementById('toast-area')
  const cls = type==='error' ? 'bg-rose-100 text-rose-800' : type==='info' ? 'bg-stone-800 text-white' : 'bg-emerald-100 text-emerald-800'

/* =====================================================================
   HIGHLIGHT ENGINE  (cho cả Student và Teacher)
   ===================================================================== */
function getPlainOffsetWithin(container, node, offset){
  if (!container.contains(node)) return -1
  let total = 0
  const walker = document.createTreeWalker(container, NodeFilter.SHOW_TEXT, null)
  let cur
  while ((cur = walker.nextNode())){ if (cur === node) return total + offset; total += cur.nodeValue.length }
  return -1
}
function renderTextWithHighlights(plainText, highlights){
  if (!highlights || highlights.length === 0) return esc(plainText)
  const sorted = [...highlights].sort((a,b) => a.start_offset - b.start_offset)
  const safe = []; let lastEnd = -1
  sorted.forEach(h => { if (h.start_offset >= lastEnd){ safe.push(h); lastEnd = h.end_offset } })
  let out = '', cursor = 0
  safe.forEach(h => {
    if (h.start_offset > cursor) out += esc(plainText.slice(cursor, h.start_offset))
    const seg = plainText.slice(h.start_offset, h.end_offset)
    const tip = h.comment ? ` title="${esc(h.comment)}"` : ''
    out += `<mark class="h-${h.color}" data-hid="${h.id}"${tip} onclick="hlClick(event,'${h.id}')">${esc(seg)}</mark>`
    cursor = h.end_offset
  })
  if (cursor < plainText.length) out += esc(plainText.slice(cursor))
  return out
}
function clearHlToolbar(){ document.getElementById('hl-toolbar-area').innerHTML = '' }
function showHlToolbar(rect, locKey, region, start, end){
  const area = document.getElementById('hl-toolbar-area')
  const top  = window.scrollY + rect.top - 44
  const left = window.scrollX + rect.left + (rect.width / 2)
  const swatches = HL_COLORS.map(c =>
    `<div class="hl-swatch" style="background:var(--hl-${c})" title="${c}" onclick="addHlSelected('${c}','${esc(locKey)}','${region}',${start},${end})"></div>`
  ).join('')
  area.innerHTML = `<div class="hl-toolbar fade-in" style="top:${top}px;left:${left}px;transform:translateX(-50%)">
    ${swatches}
    <div class="w-px h-5 bg-chalk mx-1"></div>
    <button class="btn-ghost text-[12px]" onclick="clearHlToolbar()">Đóng</button>
  </div>`
}
function canHighlightNow(){
  if (!S.user) return false
  /* Teacher trong review, hoặc Student khi đang làm bài / xem result */
  if (S.user.role === 'teacher' && S.view === 't-review') return true
  if (S.user.role === 'student' && (S.view === 'week' || S.view === 'result')) return true
  return false
}
function onMouseUpHighlight(){
  if (!canHighlightNow()){ clearHlToolbar(); return }
  const sel = window.getSelection()
  if (!sel || sel.rangeCount === 0 || sel.isCollapsed){ clearHlToolbar(); return }
  const range = sel.getRangeAt(0)
  let node = range.commonAncestorContainer
  if (node.nodeType === 3) node = node.parentElement
  const container = node.closest('.selectable')
  if (!container){ clearHlToolbar(); return }
  if (!container.contains(range.startContainer) || !container.contains(range.endContainer)){ clearHlToolbar(); return }
  const start = getPlainOffsetWithin(container, range.startContainer, range.startOffset)
  const end   = getPlainOffsetWithin(container, range.endContainer,   range.endOffset)
  if (start < 0 || end < 0 || end <= start){ clearHlToolbar(); return }
  const rect = range.getBoundingClientRect()
  showHlToolbar(rect, container.dataset.loc, container.dataset.region, start, end)
}
async function addHlSelected(color, locKey, region, start, end){
  clearHlToolbar(); window.getSelection().removeAllRanges()
  /* Xác định ngữ cảnh: student tự làm bài → student_id = mình; teacher → student đang chữa */
  const isTeacher = S.user.role === 'teacher'
  const studentId = isTeacher ? S.selStudent.id : S.user.id
  const subType   = isTeacher ? S.revType : (S.activeTab === 'inClass' ? 'inClass' : (S.activeTab === 'homework' ? 'homework' : (S.resultType || 'inClass')))
  try {
    const row = await dbAddHighlight({
      student_id: studentId, week_id: S.selWid, sub_type: subType,
      region, loc_key: locKey, start_offset: start, end_offset: end,
      color, comment: '', created_by: isTeacher ? 'teacher' : studentId
    })
    set({ highlights: [...S.highlights, row] })
  } catch(e){ console.error(e); toast('Lỗi lưu highlight','error') }
}
async function hlClick(ev, id){
  ev.stopPropagation()
  const h = S.highlights.find(x => x.id === id); if (!h) return
  /* Student chỉ xoá được highlight của mình; teacher xoá tất cả */
  const isTeacher = S.user.role === 'teacher'
  if (!isTeacher && h.created_by !== S.user.id){ toast('Highlight này do giáo viên tạo','info'); return }
  if (!confirm('Xoá highlight này?')) return
  try { await dbDeleteHighlight(id); set({ highlights: S.highlights.filter(x => x.id !== id) }) }
  catch(e){ toast('Lỗi xoá','error') }
}
function highlightsFor(region, locKey){ return S.highlights.filter(h => h.region === region && h.loc_key === locKey) }

   RENDER HELPERS — passages, exercises (IELTS-style)
   ===================================================================== */
function passageHTML(paras, opts = {}){
  return paras.map((p, i) => {
    const locKey = `p-${i}`
    const hls = opts.withHighlights ? highlightsFor('passage', locKey) : []
    return `<p class="selectable text-[14.5px] leading-[1.85] text-ink mb-3.5" data-region="passage" data-loc="${locKey}">${renderTextWithHighlights(p, hls)}</p>`
  }).join('')
}
function selectableInline(text, region, locKey, opts = {}){
  const hls = opts.withHighlights ? highlightsFor(region, locKey) : []
  return `<span class="selectable" data-region="${region}" data-loc="${locKey}">${renderTextWithHighlights(text, hls)}</span>`
}
function explainBlock(item, opts){
  if (!opts.showExplain || !item.explain) return ''
  const k = String(item.num)
  const expanded = S.expandExplain[k]
  return `<div class="mt-2">
    <button class="btn-ghost text-[12px]" onclick="toggleExplain('${k}')">${expanded?'▾':'▸'} Giải thích</button>
    ${expanded ? `<div class="mt-1 ml-2 pl-3 border-l-2 border-gold/60 text-[12.5px] text-ink leading-[1.6] bg-amber-50/40 py-2 rounded-r">${esc(item.explain)}</div>` : ''}
  </div>`
}

/* IELTS-style section renderer: section header (Questions X-Y + instruction), question blocks */
function renderSection(sec, answers, submitted, role, opts = {}){
  const showCorrect = opts.showCorrect, marks = opts.marks || {}, correctOverride = opts.correctOverride || {}
  const hl = opts.withHighlights
  const region = 'questions'

  const header = `
    <div class="mb-3.5">
      <h3 class="text-[15px] font-bold text-ink mb-1">${esc(sec.title)}</h3>
      <p class="text-[13.5px] text-[#1d3557] leading-[1.55]">${esc(sec.instruction)}</p>
    </div>`

  let body = ''

  if (sec.type === 'gap-fill'){
    const rows = sec.items.map(item => {
      const before = selectableInline(item.before||'', region, `q-${item.num}-before`, {withHighlights:hl})
      const after  = selectableInline(item.after||'',  region, `q-${item.num}-after`,  {withHighlights:hl})
      const m = marks[item.num]
      const inputCls = m === 'correct' ? 'border-emerald-500 bg-emerald-50 text-emerald-800'
                     : m === 'wrong' ? 'border-rose-500 bg-rose-50 text-rose-800' : 'border-exambr/60 bg-examhi/30'
      const dis = submitted ? 'disabled' : ''
      const oninput = submitted ? '' : `oninput="setAns('${role}',${item.num},this.value)"`
      const correctNote = showCorrect && m === 'wrong'
        ? `<div class="text-[12px] text-moss mt-1 ml-7">→ <strong>${esc(correctOverride[item.num] || (Array.isArray(item.answer)?item.answer.join(' / '):item.answer))}</strong></div>` : ''
      return `<div class="text-[14px] leading-[2] q-anchor mb-1" id="q-${item.num}">
        <span class="q-num-pill">${item.num}</span>${before}
        <input class="input-sm inline-block w-32 ${inputCls}" value="${esc(answers[item.num]||'')}" ${dis} ${oninput}>
        ${after}
        ${correctNote}${explainBlock(item, opts)}
      </div>`
    }).join('')
    body = `${sec.noteTitle ? `<p class="text-[13.5px] font-semibold text-ink mb-2">${esc(sec.noteTitle)}</p>` : ''}${rows}`
  }

  if (sec.type === 'tfng'){
    body = sec.items.map(item => {
      const m = marks[item.num]
      const stmt = selectableInline(item.statement, region, `q-${item.num}-stmt`, {withHighlights:hl})
      const correctNote = showCorrect && m === 'wrong'
        ? `<div class="text-[12px] text-moss mt-2 pl-3">→ <strong>${esc(correctOverride[item.num] || item.answer)}</strong></div>` : ''
      return `<div class="q-block q-anchor" id="q-${item.num}">
        <p class="text-[14px] leading-[1.6] text-ink mb-2"><span class="q-num-pill">${item.num}</span>${stmt}</p>
        <div class="space-y-0.5">
          ${TFNG.map(opt => {
            const sel = answers[item.num] === opt
            const cls = sel ? (showCorrect ? (m === 'correct' ? 'sel-correct' : 'sel-wrong') : 'sel') : ''
            const onclick = submitted ? '' : `onclick="setAns('${role}',${item.num},'${opt}')"`
            return `<div class="ans-row ${cls}" ${onclick}>
              <span class="text-[13px] font-medium text-ink">${opt}</span>
            </div>`
          }).join('')}
        </div>
        ${correctNote}${explainBlock(item, opts)}
      </div>`
    }).join('')
  }

  if (sec.type === 'mcq'){
    body = sec.items.map(item => {
      const m = marks[item.num]
      const qText = selectableInline(item.question, region, `q-${item.num}-q`, {withHighlights:hl})
      const correctNote = showCorrect && m === 'wrong'
        ? `<div class="text-[12px] text-moss mt-2 pl-3">→ <strong>${esc(correctOverride[item.num] || item.answer)}</strong></div>` : ''
      return `<div class="q-block q-anchor" id="q-${item.num}">
        <p class="text-[14px] font-medium text-ink mb-2 leading-[1.55]"><span class="q-num-pill">${item.num}</span>${qText}</p>
        <div class="space-y-0.5">
        ${item.options.map(opt => {
          const sel = answers[item.num] === opt.l
          const cls = sel ? (showCorrect ? (m === 'correct' ? 'sel-correct' : 'sel-wrong') : 'sel') : ''
          const onclick = submitted ? '' : `onclick="setAns('${role}',${item.num},'${opt.l}')"`
          const optTxt = selectableInline(opt.t, region, `q-${item.num}-opt-${opt.l}`, {withHighlights:hl})
          return `<div class="ans-row ${cls}" ${onclick}>
            <input type="radio" class="mt-1 accent-exambr pointer-events-none" ${sel?'checked':''}>
            <span class="text-[14px] text-ink leading-[1.55]">${optTxt}</span>
          </div>`
        }).join('')}
        </div>
        ${correctNote}${explainBlock(item, opts)}
      </div>`
    }).join('')
  }

  if (sec.type === 'mcq-multi'){
    const picked = sec.nums.map(n => answers[n]).filter(Boolean)
    const allMarks = sec.nums.map(n => marks[n])
    const isCorrect = allMarks.every(x => x === 'correct') && allMarks.length === sec.pickN
    const wrong = showCorrect && allMarks.some(x => x === 'wrong')
    const onPick = (l) => submitted ? '' : `onclick="pickMulti('${role}','${sec.nums.join(',')}',${sec.pickN},'${l}')"`
    const correctNote = wrong
      ? `<div class="text-[12px] text-moss mt-2 pl-3">→ <strong>${esc(correctOverride[sec.nums.join(',')] || sec.answers.join(', '))}</strong></div>` : ''
    body = `<div class="q-anchor" id="q-${sec.nums[0]}">
      <p class="text-[14px] font-medium text-ink mb-1 leading-[1.55]">
        <span class="q-num-pill" style="width:auto;padding:0 8px">${sec.nums.join('–')}</span>
        ${esc(sec.instruction)}
      </p>
      <p class="text-[12px] text-stone mb-2">Đã chọn ${picked.length}/${sec.pickN}</p>
      <div class="space-y-0.5">
      ${sec.options.map(opt => {
        const sel = picked.includes(opt.l)
        const cls = sel ? (showCorrect ? (isCorrect?'sel-correct':wrong?'sel-wrong':'sel') : 'sel') : ''
        const optTxt = selectableInline(opt.t, region, `q-${sec.nums.join('_')}-opt-${opt.l}`, {withHighlights:hl})
        return `<div class="ans-row ${cls}" ${onPick(opt.l)}>
          <input type="checkbox" class="mt-1 accent-exambr pointer-events-none" ${sel?'checked':''}>
          <span class="text-[14px] text-ink leading-[1.55]">${optTxt}</span>
        </div>`
      }).join('')}
      </div>
      ${correctNote}${explainBlock({num: sec.nums.join(','), explain: sec.explain}, opts)}
    </div>`
  }

  return `<div class="mb-7">${header}${body}</div>`
}

function renderFormItems(items, answers, submitted, role, opts = {}){
  const showCorrect = opts.showCorrect, marks = opts.marks || {}, correctOverride = opts.correctOverride || {}
  return items.map(it => {
    if (it.type === 'section'){
      return `<div class="${it.isMain ? 'mt-0 mb-3 pb-2 border-b border-chalk' : 'mt-5 mb-3'}">
        <${it.isMain?'h2':'h3'} class="${it.isMain ? 'text-[16px] font-medium text-forest' : 'text-[13px] font-bold text-forest uppercase tracking-wide'}">${esc(it.text)}</${it.isMain?'h2':'h3'}>
      </div>`
    }
    if (it.type === 'static'){
      const pl = it.deep ? 'pl-9' : it.indent ? 'pl-5' : ''
      return `<div class="flex items-baseline gap-2 text-[14px] leading-[2.1] flex-wrap ${pl}">
        <span class="font-medium text-stone min-w-[110px]">${esc(it.label)}</span><span>${esc(it.value||'')}</span>
      </div>`
    }
    if (it.type === 'input'){
      const pl = it.deep ? 'pl-9' : it.indent ? 'pl-5' : ''
      const m = marks[it.num]
      const ringCls = m === 'correct' ? 'border-emerald-500 bg-emerald-50 text-emerald-800'
                     : m === 'wrong' ? 'border-rose-500 bg-rose-50 text-rose-800' : 'border-exambr/60 bg-examhi/30'
      const dis = submitted ? 'disabled' : ''
      const oninput = submitted ? '' : `oninput="setAns('${role}',${it.num},this.value)"`
      const correctNote = showCorrect && m === 'wrong'
        ? `<div class="text-[12px] text-moss ml-2">→ <strong>${esc(correctOverride[it.num] || (Array.isArray(it.answer)?it.answer.join(' / '):it.answer))}</strong></div>` : ''
      return `<div class="flex items-center gap-2 text-[14px] leading-[2.2] flex-wrap ${pl} q-anchor" id="q-${it.num}">
        ${it.prefix ? `<span class="text-ink">${esc(it.prefix)}</span>` : ''}
        <span class="q-num-pill">${it.num}</span>
        <input class="input-sm w-36 ${ringCls}" value="${esc(answers[it.num]||'')}" ${dis} ${oninput}>
        ${it.suffix ? `<span class="text-ink">${esc(it.suffix)}</span>` : ''}
        ${correctNote}
      </div>`
    }
    return ''
  }).join('')
}

function viewCourseOutline(){
  const c = getCourse(S.selCourse); if (!c) return ''
  const subs = S.subs, prog = S.prog
  const weeks = courseWeeks(c)
  const live = weeks.filter(w => w.live).length
  const done = weeks.filter(w => w.live && subs[w.id+'-inClass'] && subs[w.id+'-homework']).length
  const pct = live ? Math.round(done/live*100) : 0

  const row = (w, idx) => {
    const ic = subs[w.id+'-inClass'], hw = subs[w.id+'-homework']
    const t = prog[w.id]
    let status, statusCls
    if (!w.live){ status='🔒 Sắp có'; statusCls='text-stone' }
    else if (ic && hw){ status='✓ Hoàn thành'; statusCls='text-emerald-700' }
    else if (ic){ status='Còn BTVN'; statusCls='text-amber-700' }
    else if (t){ status='Chưa làm bài'; statusCls='text-amber-700' }
    else { status='Chưa bắt đầu'; statusCls='text-stone' }
    const scoreCell = (s) => s ? `<span class="text-[12px] font-semibold">${s.score}/${s.total}</span>` : `<span class="text-[12px] text-stone">—</span>`
    return `<div onclick="${w.live?`doPickWeek('${w.id}')`:''}" class="card p-4 ${w.live?'cursor-pointer hover:shadow-float hover:border-forest/30 transition':'opacity-60'}">
      <div class="flex items-center gap-4">
        <div class="w-10 h-10 rounded-lg ${w.live?'bg-forest text-white':'bg-mist text-stone'} flex items-center justify-center font-display text-[16px] font-medium flex-shrink-0">${idx+1}</div>
        <div class="flex-1 min-w-0">
          <p class="text-[10.5px] font-bold text-${c.accent}-700 uppercase tracking-wider mb-0.5">${esc(w.wk)}</p>
          <p class="text-[14.5px] font-semibold text-ink leading-tight mb-0.5">${esc(w.title)}</p>
          ${w.subtitle ? `<p class="text-[12px] text-stone">${esc(w.subtitle)}</p>` : ''}

        <div class="hidden md:flex items-center gap-6 text-center">
          <div><p class="lbl-mute mb-0.5">Lý thuyết</p>${t?'<span class="chip-correct">✓</span>':'<span class="chip-empty">—</span>'}</div>
          <div><p class="lbl-mute mb-0.5">Trên lớp</p>${scoreCell(ic)}</div>
          <div><p class="lbl-mute mb-0.5">BTVN</p>${scoreCell(hw)}</div>
        </div>
        <div class="text-right min-w-[100px]">
          <p class="text-[12px] font-medium ${statusCls}">${status}</p>
          ${w.live?'<span class="text-[11px] text-stone">→ Vào bài</span>':''}
        </div>
      </div>
    </div>`
  }

  return `<div class="min-h-screen">
    <header class="bg-white border-b border-chalk px-5 py-3 sticky top-0 z-30 flex items-center gap-3">
      <button class="btn" onclick="backToCourses()">← Khoá học</button>
      <div class="flex-1"></div>
      <span class="text-[13px] text-ink font-medium hidden md:block">${esc(S.user.name)}</span>
    </header>
    <section class="bg-gradient-to-br ${c.bgClass} text-white px-7 py-10">
      <div class="max-w-5xl mx-auto">
        <div class="flex items-center gap-3 mb-3">
          <span class="text-3xl">${c.icon}</span>
          <span class="text-[11px] bg-white/15 px-2.5 py-1 rounded-full font-medium tracking-wider uppercase">${c.level}</span>
        </div>
        <h1 class="font-display text-[32px] font-medium leading-tight mb-2">${esc(c.title)}</h1>
        <p class="text-[14.5px] text-white/80 max-w-2xl mb-5">${esc(c.desc)}</p>
        <div class="flex items-center gap-6 text-[13px]">
          <div><p class="text-white/60 text-[11px] uppercase tracking-wider">Tiến độ</p><p class="font-display text-[20px]">${done}<span class="opacity-60">/${live}</span></p></div>
          <div class="flex-1 max-w-md"><div class="h-2 bg-white/15 rounded-full overflow-hidden"><div class="h-full bg-white rounded-full" style="width:${pct}%"></div></div></div>
          <div class="text-right"><p class="text-white/60 text-[11px] uppercase tracking-wider">% hoàn thành</p><p class="font-display text-[20px]">${pct}%</p></div>

/* =====================================================================
   VIEWS — Exercise (IELTS Mock-test style: header + footer chrome)
   ===================================================================== */
function tabExercise(week, type){
  const ex = getEx(week, type)
  if (!ex) return `<div class="py-20 text-center text-stone">Chưa có bài tập</div>`
  const answers = type === 'inClass' ? S.ansIC : S.ansHW
  const submitted = type === 'inClass' ? S.submittedIC : S.submittedHW
  const total = countQs(ex)
  const filled = Object.values(answers).filter(v => v && String(v).trim()).length
  const role = type === 'inClass' ? 'IC' : 'HW'

  /* Build footer: simulate 1 part for now (we have one exercise per type).
     In real IELTS có Part 1/2/3 — sau này nếu thêm sections sẽ tách. */
  const partBadge = ex.partLabel || 'Part 1'
  const partNums = [1,2,3].map(i => {
    const isAct = i === 1
    return `<span class="exam-pill ${isAct?'act':''}">${i}</span>`
  }).join('')

  /* Question number pills in footer (1..N) */
  const numPills = (() => {
    const items = listAllItems(ex)
    const flat = []
    items.forEach(it => {
      if (it.kind === 'mcq-multi') it.nums.forEach(n => flat.push({n, ans: answers[n]}))
      else flat.push({n: it.num, ans: answers[it.num]})
    })
    return flat.map(({n, ans}) =>
      `<span class="exam-pill ${ans?'done':''}" onclick="document.getElementById('q-${n}')?.scrollIntoView({behavior:'smooth',block:'start'})">${n}</span>`
    ).join(' ')
  })()

  let main = ''
  if (ex.passageTitle){
    /* Reading: 2-pane split, IELTS style */
    main = `<div class="flex" style="height:calc(100vh - 57px - 64px - 44px - 50px)">
      <aside class="bg-white pane-scroll p-7 flex-1 border-r border-[#d6d9de]">
        <div class="font-serif">
          ${passageHTML(type==='inClass'?READING_PASSAGE_INCLASS:READING_PASSAGE_HOMEWORK, {withHighlights:true})}
        </div>
      </aside>
      <div class="pane-divider"><div class="grip"></div></div>
      <section class="bg-white pane-scroll p-7 flex-1">
        ${ex.sections.map(sec => renderSection(sec, answers, submitted, role, {withHighlights:true})).join('')}
      </section>
    </div>
    <style>@media(max-width:900px){.flex[style*="calc(100vh"]{flex-direction:column;height:auto!important}.pane-divider{display:none}}</style>`
  } else {
    /* Listening: form-fill, sticky audio */
    main = `<div class="bg-white pane-scroll p-7" style="min-height:calc(100vh - 57px - 64px - 44px - 50px)">
      <div class="max-w-3xl mx-auto">
        <div class="card p-4 mb-5 bg-forest text-white border-forest flex items-center gap-3 sticky top-0">
          <span class="text-2xl">🎧</span>
          <div class="flex-1">
            <p class="text-[10.5px] text-gold font-semibold tracking-wider uppercase mb-1">Audio bài tập</p>
            <audio controls preload="metadata" class="w-full"><source src="${esc(ex.audioUrl)}" type="audio/mpeg"></audio>
          </div>
        </div>
        <div class="mb-3">
          <h3 class="text-[15px] font-bold text-ink mb-1">📋 ${esc(ex.formTitle)}</h3>
          <p class="text-[13.5px] text-[#1d3557] leading-[1.55]">Complete the form below. Write NO MORE THAN TWO WORDS AND/OR A NUMBER for each answer.</p>
        </div>
        ${renderFormItems(ex.formItems, answers, submitted, role)}
      </div>
    </div>`
  }

  return `<div class="exam-shell">
    <div class="exam-header">
      <span class="ielts-logo">IELTS</span>
      <span class="opacity-90">${esc(week.course)} · ${esc(S.user.name)}</span>
      <div class="flex-1"></div>
      <span class="text-[12px] opacity-80">⏱ Tự do · 🔆 ${type==='inClass'?'Bài tập trên lớp':'Bài tập về nhà'}</span>
      <div class="flex items-center gap-1.5 ml-3">
        <div class="w-1.5 h-1.5 rounded-full bg-emerald-400"></div><span class="text-[12px]">Online</span>
      </div>
    </div>
    <div class="exam-strip flex items-center gap-3 flex-wrap">
      <span class="text-[13.5px] font-bold text-ink">${esc(partBadge)}</span>
      <span class="text-[13px] text-stone">${esc(ex.partInstruction || 'Read the text and answer the questions.')}</span>
      <div class="flex-1"></div>
      <div class="text-[12px] text-stone">💡 Kéo chọn text bất kỳ để highlight (5 màu)</div>
    </div>
    ${main}
    <div class="exam-foot">
      <span class="text-[12px] opacity-90 mr-2">${esc(partBadge)}</span>
      ${partNums}
      <div class="w-px h-5 bg-white/20 mx-2"></div>
      <div class="flex items-center gap-1.5 flex-wrap">${numPills}</div>
      <div class="flex-1"></div>
      <span class="text-[12px] opacity-90 mr-2">${filled}/${total}</span>
      <span class="exam-arrow" title="Trước">←</span>
      <span class="exam-arrow" title="Sau">→</span>
      ${submitted
        ? `<span class="exam-check" title="Xem kết quả" onclick="viewMyResult('${type}')">📊</span>`
        : `<span class="exam-check" title="Nộp bài" onclick="trySubmit('${type}')">✓</span>`}
    </div>
  </div>`
}

   VIEWS — Result Page
   ===================================================================== */
function viewResult(){
  const week = getWeek(S.selWid); if (!week) return ''
  const type = S.resultType
  const ex = getEx(week, type)
  const sub = S.subs[S.selWid + '-' + type]
  if (!sub) return `<div class="p-12 text-center text-stone">Không tìm thấy bài làm.</div>`
  const answers = sub.answers || {}
  const marks = sub.auto_marks || {}
  const score = sub.score || 0, total = sub.total || countQs(ex)
  const pct = total ? Math.round(score/total*100) : 0
  const correctOverride = S.rev?.correct_answers || {}
  const bandColor = pct >= 80 ? 'emerald' : pct >= 50 ? 'amber' : 'rose'

  const breakdown = ex.passageTitle
    ? `<div class="flex" style="min-height:calc(100vh - 360px)">
        <aside class="bg-white border border-chalk rounded-l-xl pane-scroll p-7 flex-1">
          <p class="lbl mb-3">📖 Bài đọc</p>
          <h3 class="font-display text-[18px] font-medium mb-4">${esc(ex.passageTitle)}</h3>
          <div class="font-serif">${passageHTML(type==='inClass'?READING_PASSAGE_INCLASS:READING_PASSAGE_HOMEWORK, {withHighlights:true})}</div>
        </aside>
        <div class="pane-divider rounded-none border-y border-chalk"><div class="grip"></div></div>
        <section class="bg-white border-y border-r border-chalk rounded-r-xl pane-scroll p-7 flex-1">
          ${ex.sections.map(sec => renderSection(sec, answers, true, type==='inClass'?'IC':'HW', { showCorrect:true, marks, correctOverride, showExplain:true, withHighlights:true })).join('')}
        </section>
      </div>
      <style>@media(max-width:900px){.flex[style*="min-height"]{flex-direction:column}.pane-divider{display:none}}</style>`
    : `<div class="card p-5 mt-5">
        ${renderFormItems(ex.formItems, answers, true, type==='inClass'?'IC':'HW', { showCorrect:true, marks, correctOverride })}
      </div>`

  return `<div class="min-h-screen">
    <header class="bg-white border-b border-chalk px-5 py-3 sticky top-0 z-30 flex items-center gap-3">
      <button class="btn" onclick="backFromResult()">← Quay lại</button>
      <span class="text-[13px] text-stone">${esc(week.course)} · ${esc(week.wk)} · ${type==='inClass'?'Bài tập trên lớp':'Bài tập về nhà'}</span>
      <div class="flex-1"></div>
      <button class="btn-green" onclick="doShare()">🔗 Chia sẻ kết quả</button>
    </header>
    <main class="max-w-7xl mx-auto px-5 py-7 fade-in">
      <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-5">
        <div class="card p-6 text-center bg-${bandColor}-50 border-${bandColor}-200">
          <p class="lbl-mute mb-2">Điểm số</p>
          <p class="font-display text-[44px] font-medium leading-none text-${bandColor}-700">${score}<span class="text-stone text-[20px]">/${total}</span></p>
          <p class="text-[14px] text-${bandColor}-700 font-semibold mt-1">${pct}%</p>
        </div>
        <div class="card p-6 text-center">
          <p class="lbl-mute mb-2">Số câu đúng</p>
          <p class="font-display text-[44px] font-medium leading-none text-emerald-600">${score}</p>
          <p class="text-[12.5px] text-stone mt-1">trên tổng ${total} câu</p>
        </div>
        <div class="card p-6 text-center">
          <p class="lbl-mute mb-2">Số câu sai</p>
          <p class="font-display text-[44px] font-medium leading-none text-rose-600">${total - score}</p>
          <p class="text-[12.5px] text-stone mt-1">cần xem lại</p>
        </div>
      </div>
      ${S.shareUrl ? `
        <div class="card p-4 mb-5 bg-emerald-50 border-emerald-200 flex items-center gap-3 flex-wrap">
          <span class="text-emerald-700 font-medium text-[13px]">🔗 Link chia sẻ:</span>
          <code class="bg-white px-3 py-1.5 rounded-md border border-chalk text-[12.5px] flex-1 min-w-0 overflow-x-auto">${esc(S.shareUrl)}</code>
          <button class="btn" onclick="copyShare()">📋 Copy</button>
        </div>` : ''}
      <p class="lbl-mute mb-3">Chi tiết từng câu</p>
      ${breakdown}
    </main>
  </div>`
}

function viewTeacherStudent(){
  const s = S.selStudent
  const subs = S.selStudentSubs, prog = S.selStudentProg
  const liveWeeks = WEEKS.filter(w => w.live)
  const totalCompleted = liveWeeks.filter(w => subs[w.id+'-inClass'] && subs[w.id+'-homework']).length
  const totalScore = liveWeeks.reduce((a,w)=> a + (subs[w.id+'-inClass']?.score||0) + (subs[w.id+'-homework']?.score||0), 0)
  const totalMax   = liveWeeks.reduce((a,w)=> a + (subs[w.id+'-inClass']?.total||0) + (subs[w.id+'-homework']?.total||0), 0)
  const theoryDone = liveWeeks.filter(w => prog[w.id]).length
  const activities = []
  liveWeeks.forEach(w => { ['inClass','homework'].forEach(t => { const sub = subs[w.id+'-'+t]; if (sub) activities.push({wid:w.id, type:t, week:w, sub, when: new Date(sub.submittedAt)}) }) })
  activities.sort((a,b) => b.when - a.when)

  const weekRow = (w) => {
    const ic = subs[w.id+'-inClass'], hw = subs[w.id+'-homework'], t = prog[w.id]
    const cell = (s, type) => {
      if (!s) return `<button class="btn-ghost text-stone text-[12px]" disabled>Chưa nộp</button>`
      const pct = s.total ? Math.round(s.score/s.total*100) : 0
      const cl = pct >= 80 ? 'text-emerald-700 bg-emerald-50 border-emerald-200' : pct >= 50 ? 'text-amber-700 bg-amber-50 border-amber-200' : 'text-rose-700 bg-rose-50 border-rose-200'
      return `<button class="px-3 py-1.5 rounded-md border ${cl} text-[12px] font-semibold hover:opacity-80 transition" onclick="event.stopPropagation();doOpenReview('${S.selStudent.id}','${w.id}','${type}')">${s.score}/${s.total} · ${pct}%</button>`
    }
    return `<div class="card p-4 grid grid-cols-12 gap-3 items-center">
      <div class="col-span-12 md:col-span-5">
        <p class="text-[10.5px] text-gold font-semibold uppercase tracking-wider">${esc(w.wk)} · ${esc(w.course)}</p>
        <p class="text-[14px] font-medium text-ink mt-0.5">${esc(w.title)}</p>
      </div>
      <div class="col-span-4 md:col-span-2 text-center"><p class="text-[10.5px] text-stone uppercase tracking-wider mb-1">Lý thuyết</p>${t?'<span class="chip-correct">✓ Xong</span>':'<span class="chip-empty">Chưa</span>'}</div>
      <div class="col-span-4 md:col-span-2 text-center"><p class="text-[10.5px] text-stone uppercase tracking-wider mb-1">Trên lớp</p>${cell(ic,'inClass')}</div>
      <div class="col-span-4 md:col-span-3 text-center"><p class="text-[10.5px] text-stone uppercase tracking-wider mb-1">BTVN</p>${cell(hw,'homework')}</div>
    </div>`
  }

  return `<div class="min-h-screen">
    <header class="bg-white border-b border-chalk px-5 py-3 sticky top-0 z-30 flex items-center gap-3">
      <button class="btn" onclick="backToTeacher()">← Danh sách</button>
      <div class="flex items-center gap-3 flex-1 min-w-0">
        <div class="w-9 h-9 rounded-full bg-forest text-white flex items-center justify-center font-semibold">${esc((s.name||'?').slice(0,1).toUpperCase())}</div>
        <div class="min-w-0"><p class="text-[14px] font-medium text-ink truncate">${esc(s.name)}</p><p class="text-[11.5px] text-stone">Mã lớp: ${esc(s.class_code)}</p></div>
      </div>
    </header>
    <main class="max-w-6xl mx-auto px-5 py-6 fade-in">
      <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6">
        <div class="card p-4"><p class="lbl-mute mb-1">Hoàn thành</p><p class="font-display text-[24px] font-medium">${totalCompleted}<span class="text-stone text-[14px]">/${liveWeeks.length}</span></p></div>
        <div class="card p-4"><p class="lbl-mute mb-1">Tổng điểm</p><p class="font-display text-[24px] font-medium text-emerald-700">${totalScore}<span class="text-stone text-[14px]">/${totalMax}</span></p></div>
        <div class="card p-4"><p class="lbl-mute mb-1">Lý thuyết</p><p class="font-display text-[24px] font-medium">${theoryDone}<span class="text-stone text-[14px]">/${liveWeeks.length}</span></p></div>
        <div class="card p-4"><p class="lbl-mute mb-1">Hoạt động</p><p class="font-display text-[24px] font-medium">${activities.length}</p></div>
      </div>
      <div class="grid grid-cols-1 lg:grid-cols-3 gap-5">
        <div class="lg:col-span-2"><p class="lbl-mute mb-3">📚 Tiến độ theo tuần</p><div class="grid gap-2">${liveWeeks.map(weekRow).join('')}</div></div>
        <div>
          <p class="lbl-mute mb-3">🕒 Hoạt động gần đây</p>
          <div class="card p-2 divide-y divide-mist">
            ${activities.length === 0 ? `<p class="p-4 text-stone text-[13px] text-center">Chưa có hoạt động nào.</p>` :
              activities.slice(0,12).map(a => {
                const pct = a.sub.total ? Math.round(a.sub.score/a.sub.total*100) : 0
                return `<div class="p-3 hover:bg-bone transition cursor-pointer" onclick="doOpenReview('${S.selStudent.id}','${a.wid}','${a.type}')">
                  <div class="flex items-center justify-between gap-2"><p class="text-[12.5px] font-medium text-ink">${esc(a.week.wk)} · ${a.type==='inClass'?'Trên lớp':'BTVN'}</p>
                    <span class="text-[11.5px] font-semibold ${pct>=80?'text-emerald-700':pct>=50?'text-amber-700':'text-rose-700'}">${a.sub.score}/${a.sub.total}</span></div>
                  <p class="text-[11px] text-stone mt-0.5">${a.when.toLocaleString('vi-VN')}</p>
                </div>`
              }).join('')}
          </div>
        </div>
      </div>
    </main>
  </div>`
}

function viewTeacherReview(){
  const week = getWeek(S.selWid); if (!week) return ''
  const ex = getEx(week, S.revType)
  const answers = S.revAnswers
  const auto = S.revAuto
  const merged = { ...auto, ...(S.rev.marks || {}) }
  const switchBtn = (other, lbl) => `<button class="btn" onclick="switchRevType('${other}')">→ ${lbl}</button>`

  const head = `
    <header class="bg-white border-b border-chalk px-5 py-3 sticky top-0 z-30 flex items-center gap-3 flex-wrap">
      <button class="btn" onclick="backFromReview()">← ${S.selStudent ? 'Hồ sơ HV' : 'Danh sách'}</button>
      <div class="flex items-center gap-3 min-w-0 flex-1">
        <div class="w-8 h-8 rounded-full bg-forest text-white flex items-center justify-center text-[12px] font-semibold">${esc((S.selStudent?.name||'?').slice(0,1).toUpperCase())}</div>
        <div class="min-w-0">
          <p class="text-[13.5px] font-medium text-ink truncate">${esc(S.selStudent?.name||'')} · ${esc(week.wk)} ${esc(week.course)}</p>
          <p class="text-[11px] text-stone">${S.revType==='inClass'?'Bài tập trên lớp':'Bài tập về nhà'}</p>
        </div>
      </div>
      ${S.revType === 'inClass' ? switchBtn('homework','BTVN') : switchBtn('inClass','Bài trên lớp')}
      <button class="btn-green" onclick="doSaveReview()">💾 Lưu nhận xét</button>
    </header>`

  const sub = S.subs[S.selWid + '-' + S.revType] || S.selStudentSubs[S.selWid + '-' + S.revType]
  if (!sub){
    return `<div class="min-h-screen">${head}
      <div class="card max-w-md mx-auto mt-16 p-8 text-center">
        <p class="text-stone"><strong>${esc(S.selStudent?.name||'')}</strong> chưa nộp ${S.revType==='inClass'?'bài tập trên lớp':'bài tập về nhà'} của tuần này.</p>
      </div></div>`
  }

  const pct = sub.total ? Math.round(sub.score/sub.total*100) : 0
  const banner = `<div class="bg-bone border-b border-chalk px-5 py-2.5 flex items-center gap-4 text-[12.5px] sticky top-[57px] z-20 flex-wrap">
    <span class="lbl-amber">${S.revType==='inClass'?'Bài trên lớp':'BTVN'}</span>
    <span class="text-stone">·</span>
    <span class="text-ink">Điểm tự chấm: <strong class="${pct>=80?'text-emerald-700':pct>=50?'text-amber-700':'text-rose-700'}">${sub.score}/${sub.total} (${pct}%)</strong></span>
    <span class="text-stone hidden md:inline">·</span>
    <span class="text-stone hidden md:inline">Highlight tự do: kéo chọn text bất kỳ ở 2 panel</span>
  </div>`

  const revItem = (item) => {
    const num = item.num || item.nums?.join(',')
    const m = (S.rev.marks && S.rev.marks[num]) || merged[item.nums ? item.nums[0] : item.num]
    const correctOverride = (S.rev.correct_answers||{})[num] ?? ''
    const studentAns = item.kind === 'mcq-multi'
      ? item.nums.map(n => answers[n]).filter(Boolean).join(', ') || '—'
      : (answers[item.num] || '—')
    const defaultCorrect = item.kind === 'mcq-multi' ? item.answers.join(', ') : (Array.isArray(item.answer) ? item.answer.join(' / ') : item.answer)
    return `<div class="border-b border-mist pb-4 mb-4 last:border-0 last:mb-0 last:pb-0">
      <p class="text-[12.5px] text-stone mb-1.5"><span class="font-bold text-ink mr-1">${num}.</span>${esc(item.qText)}</p>
      <div class="flex items-center gap-2 flex-wrap mb-2">
        <span class="text-[11px] text-stone uppercase tracking-wider">HV trả lời:</span>
        <span class="px-2 py-0.5 rounded-md bg-bone border border-chalk text-[13px] font-medium ${m==='correct'?'text-emerald-700':m==='wrong'?'text-rose-700':''}">${esc(studentAns)}</span>
        ${m==='correct' ? '<span class="chip-correct">✓ Đúng</span>' : m==='wrong' ? '<span class="chip-wrong">✗ Sai</span>' : ''}
        <div class="flex-1"></div>
        <button onclick="setMark('${num}','correct')" class="btn-icon ${(S.rev.marks||{})[num]==='correct'?'bg-emerald-100 border-emerald-400':''}" title="Đánh dấu đúng">✓</button>
        <button onclick="setMark('${num}','wrong')" class="btn-icon ${(S.rev.marks||{})[num]==='wrong'?'bg-rose-100 border-rose-400':''}" title="Đánh dấu sai">✗</button>
        <button onclick="setMark('${num}',null)" class="btn-icon" title="Reset về auto">↺</button>
      </div>
      <div class="flex gap-2 items-center mb-2 flex-wrap">
        <span class="text-[11px] text-stone uppercase tracking-wider min-w-[60px]">Đáp án:</span>
        <input class="input-sm flex-1 min-w-[140px]" placeholder="${esc(defaultCorrect)}" value="${esc(correctOverride)}" oninput="setCorrect('${num}',this.value)">
        <span class="text-[11px] text-stone">(để trống = dùng đáp án mặc định)</span>
      </div>
      <input class="input-sm w-full" placeholder="Thêm nhận xét cho học viên..." value="${esc((S.rev.comments||{})[num]||'')}" oninput="setComment('${num}',this.value)">
    </div>`
  }

  let leftPanel, rightPanel
  if (ex.passageTitle){
    const passage = S.revType === 'inClass' ? READING_PASSAGE_INCLASS : READING_PASSAGE_HOMEWORK
    leftPanel = `<aside class="bg-white border-r border-chalk pane-scroll p-7">
      <p class="lbl mb-1">📖 Bài đọc · ${esc(ex.passageTitle)}</p>
      <p class="text-[11px] text-stone mb-4">💡 Kéo chọn text để highlight (5 màu)</p>
      <div class="font-serif">${passageHTML(passage, {withHighlights:true})}</div>
    </aside>`
    const exView = ex.sections.map(sec => renderSection(sec, answers, true, S.revType==='inClass'?'IC':'HW',
      { showCorrect:true, marks:merged, correctOverride:S.rev.correct_answers, withHighlights:true })).join('')
    const gradingItems = listAllItems(ex)
    rightPanel = `<section class="bg-cream pane-scroll p-7">
      <div class="card p-4 mb-4 bg-forest text-white border-forest">
        <p class="text-[11px] font-semibold uppercase tracking-wider text-gold mb-1.5">⚙️ Bảng chữa bài</p>
        <p class="text-[12.5px] text-white/80 leading-[1.55]">Override đúng/sai, điền đáp án chuẩn, ghi nhận xét cho từng câu. Tự lưu khi bấm "Lưu nhận xét".</p>
      </div>
      <div class="card p-5 mb-4"><p class="lbl mb-3">📋 Bài làm của học viên (đã chấm tự động)</p>${exView}</div>
      <div class="card p-5"><p class="lbl mb-3">✏️ Chữa từng câu</p>${gradingItems.map(revItem).join('')}</div>
    </section>`
  } else {
    leftPanel = `<aside class="bg-white border-r border-chalk pane-scroll p-7">
      <p class="lbl mb-2">🎧 Audio · ${esc(ex.formTitle)}</p>
      <audio controls preload="metadata" class="w-full mb-4"><source src="${esc(ex.audioUrl)}" type="audio/mpeg"></audio>
      <p class="text-[11px] text-stone mb-4">💡 Kéo chọn text để highlight</p>
      <div class="card p-4 bg-bone"><p class="lbl mb-2">📋 Form gốc</p>${renderFormItems(ex.formItems, answers, true, S.revType==='inClass'?'IC':'HW', { showCorrect:true, marks:merged, correctOverride:S.rev.correct_answers })}</div>
    </aside>`
    const gradingItems = listAllItems(ex)
    rightPanel = `<section class="bg-cream pane-scroll p-7"><div class="card p-5"><p class="lbl mb-3">✏️ Chữa từng câu</p>${gradingItems.map(revItem).join('')}</div></section>`
  }

  return `<div class="min-h-screen">${head}${banner}
    <div class="grid gap-0" style="grid-template-columns:1fr 1fr;height:calc(100vh - 113px)">${leftPanel}${rightPanel}</div>
    <style>@media(max-width:900px){.grid[style*="1fr 1fr"]{grid-template-columns:1fr!important;height:auto!important}}</style>
  </div>`
}

function viewShared(){
  const ctx = S.sharedCtx
  if (!ctx) return ''
  if (!S.user) return viewLogin()
  if (S.user.role !== 'teacher' && S.user.id !== ctx.student_id){
    return `<div class="min-h-screen flex items-center justify-center px-4">
      <div class="card p-8 max-w-md text-center">
        <div class="w-12 h-12 mx-auto rounded-full bg-rose-100 text-rose-700 flex items-center justify-center text-xl mb-3">🚫</div>
        <p class="text-[16px] font-semibold mb-1.5">Không có quyền truy cập</p>
        <p class="text-[13px] text-stone leading-[1.55] mb-4">Link này chỉ dành cho học viên đã nộp bài hoặc giáo viên.</p>
        <button class="btn" onclick="doLogout()">Đăng nhập tài khoản khác</button>
      </div>
    </div>`
  }
  S.selWid = ctx.week_id; S.resultType = ctx.sub_type
  return viewResult()
}

function viewLoading(){ return `<div class="min-h-screen flex items-center justify-center"><div class="spinner"></div></div>` }

function render(){
  const root = document.getElementById('app')
  clearHlToolbar()
  if (S.loading){ root.innerHTML = viewLoading(); return }
  switch(S.view){
    case 'login':     root.innerHTML = viewLogin(); break
    case 'courses':   root.innerHTML = viewCourses(); break
    case 'course':    root.innerHTML = viewCourseOutline(); break
    case 'week':      root.innerHTML = viewWeekDetail(); break
    case 'result':    root.innerHTML = viewResult(); break
    case 't-home':    root.innerHTML = viewTeacherHome(); break
    case 't-student': root.innerHTML = viewTeacherStudent(); break
    case 't-review':  root.innerHTML = viewTeacherReview(); break
    case 'shared':    root.innerHTML = viewShared(); break
    default:          root.innerHTML = viewLogin()
  }
}

/* =====================================================================
   ACTIONS
   ===================================================================== */
async function doLogin(){
  const name = document.getElementById('ln')?.value?.trim()
  const code = document.getElementById('lc')?.value?.trim()
  const errEl = document.getElementById('lerr')
  if (!name || !code){ if(errEl){errEl.textContent='Vui lòng nhập đầy đủ.';errEl.classList.remove('hidden')}; return }
  if (errEl) errEl.classList.add('hidden')
  const btn = document.getElementById('login-btn')
  if (btn){ btn.textContent = 'Đang xử lý...'; btn.disabled = true }
  try {
    if (code === TEACHER_PASS){
      const students = await dbLoadAllStudents()
      const user = { role:'teacher', name, id:'teacher' }
      if (S.sharedCtx){ set({ user, view:'shared' }); return }
      set({ view:'t-home', user, students }); return
    }
    const studentId = await dbUpsertStudent(name, code)
    const { subs, prog } = await dbLoadStudentData(studentId)
    const user = { role:'student', name, id:studentId }
    if (S.sharedCtx){ set({ user, subs, prog, view:'shared' }); return }
    set({ view:'courses', user, subs, prog })
  } catch(e){
    console.error(e); toast('Lỗi kết nối. Kiểm tra mạng và thử lại.','error')
    if (btn){ btn.textContent='Vào học →'; btn.disabled=false }
  }
}
function doLogout(){
  if (location.search) history.replaceState(null,'',location.pathname)
  set({
    view:'login', user:null, subs:{}, prog:{}, students:[], selStudent:null, selCourse:null, selWid:null,
    activeTab:'theory', ansIC:{}, ansHW:{}, submittedIC:false, submittedHW:false,
    rev:{marks:{},comments:{},correct_answers:{},highlights:[]}, revAuto:{}, revAnswers:{},
    highlights:[], sharedCtx:null, shareUrl:null, resultType:null, expandExplain:{}
  })
}
function doPickCourse(cid){ set({ view:'course', selCourse: cid }) }
function backToCourses(){ set({ view:'courses', selCourse:null, selWid:null }) }
function backToCourse(){
  /* Quay lại course outline (giữ selCourse). Nếu chưa biết course thì về courses */
  if (S.selCourse) set({ view:'course', selWid:null, activeTab:'theory' })
  else set({ view:'courses' })
}

async function doPickWeek(wid){
  const week = getWeek(wid); if (!week || !week.live) return
  const ic = S.subs[wid+'-inClass'], hw = S.subs[wid+'-homework']
  /* Tự động set selCourse nếu chưa có */
  let selCourse = S.selCourse
  if (!selCourse){ const c = COURSES.find(c => c.weekIds.includes(wid)); if (c) selCourse = c.id }
  /* Load highlights của student cho week này (cả inClass + homework) */
  const [hlIC, hlHW] = await Promise.all([
    dbLoadHighlights(S.user.id, wid, 'inClass'),
    dbLoadHighlights(S.user.id, wid, 'homework'),
  ])
  set({
    view:'week', selWid:wid, selCourse, activeTab:'theory',
    ansIC: ic ? {...ic.answers} : buildEmptyAnswers(week.inClass),
    ansHW: hw ? {...hw.answers} : buildEmptyAnswers(week.homework),
    submittedIC: !!ic, submittedHW: !!hw, confirmType:null, shareUrl:null, expandExplain:{},
    highlights: [...hlIC, ...hlHW]
  })
}

async function setTab(tab){
  set({ activeTab: tab, expandExplain:{} })
  /* Reload highlights cho sub_type đang xem (đã preload cả 2 lúc pickWeek nên không cần) */
}

function setAns(which, n, v){
  if (which === 'IC') set(p => ({ ansIC: {...p.ansIC, [n]: v } }))
  else                set(p => ({ ansHW: {...p.ansHW, [n]: v } }))
}
function pickMulti(role, numsStr, pickN, letter){
  const nums = numsStr.split(',').map(Number)
  const slot = role === 'IC' ? 'ansIC' : 'ansHW'
  const cur = { ...S[slot] }
  const idx = nums.findIndex(n => cur[n] === letter)
  if (idx >= 0){
    cur[nums[idx]] = ''
    const remaining = nums.map(n => cur[n]).filter(Boolean)
    nums.forEach((n,i) => cur[n] = remaining[i] || '')
  } else {
    const emptyIdx = nums.findIndex(n => !cur[n])
    if (emptyIdx >= 0) cur[nums[emptyIdx]] = letter
    else cur[nums[nums.length-1]] = letter
  }
  set({ [slot]: cur })
}
function trySubmit(type){
  const week = getWeek(S.selWid); const ex = getEx(week, type)
  const total = countQs(ex)
  const answers = type === 'inClass' ? S.ansIC : S.ansHW
  const filled = Object.values(answers).filter(v => v && String(v).trim()).length
  if (filled < total){ toast(`Còn ${total - filled} câu chưa trả lời.`,'error'); return }
  set({ confirmType: type })
}
async function doSubmit(){
  const type = S.confirmType, wid = S.selWid
  const week = getWeek(wid); const ex = getEx(week, type)
  const answers = type === 'inClass' ? S.ansIC : S.ansHW
  const { marks, score, total } = autoGrade(ex, answers)
  try {
    await dbSubmit(S.user.id, wid, type, answers, marks, score, total)
    const updated = { ...S.subs, [wid+'-'+type]: { answers:{...answers}, auto_marks:marks, score, total, submittedAt:new Date().toISOString() } }
    const patch = { subs: updated, confirmType:null, view:'result', resultType:type, shareUrl:null, rev:{marks:{},comments:{},correct_answers:{},highlights:[]} }
    if (type === 'inClass') patch.submittedIC = true; else patch.submittedHW = true
    try { const r = await dbLoadReview(S.user.id, wid, type); if (r) patch.rev = { marks:r.marks||{}, comments:r.comments||{}, correct_answers:r.correct_answers||{}, highlights:r.highlights||[] } } catch(_){}
    set(patch); toast(`Nộp thành công! Bạn được ${score}/${total} 🎉`)
  } catch(e){ console.error(e); toast('Lỗi khi nộp bài. Thử lại.','error'); set({ confirmType:null }) }
}
async function viewMyResult(type){
  const wid = S.selWid; set({ loading:true })
  try {
    let r = null; try { r = await dbLoadReview(S.user.id, wid, type) } catch(_){}
    set({ loading:false, view:'result', resultType:type, shareUrl:null,
      rev: r ? { marks:r.marks||{}, comments:r.comments||{}, correct_answers:r.correct_answers||{}, highlights:r.highlights||[] } : {marks:{},comments:{},correct_answers:{},highlights:[]} })
  } catch(e){ set({ loading:false }) }
}
function backFromResult(){ set({ view:'week', resultType:null, shareUrl:null, expandExplain:{} }) }
async function markTheory(wid){
  const next = !S.prog[wid]
  try { await dbSaveTheory(S.user.id, wid, next); set(p => ({ prog: {...p.prog, [wid]: next } })); toast(next?'Đã đánh dấu hoàn thành lý thuyết':'Đã bỏ đánh dấu') }
  catch(e){ toast('Lỗi khi lưu.','error') }
}
function toggleExplain(num){ const k = String(num); set(p => ({ expandExplain: {...p.expandExplain, [k]: !p.expandExplain[k] } })) }

async function doShare(){
  if (S.shareUrl){ copyShare(); return }
  try {
    const token = await dbCreateShareToken(S.user.id, S.selWid, S.resultType)
    const url = location.origin + location.pathname + '?share=' + token
    set({ shareUrl: url })
    try { await navigator.clipboard.writeText(url); toast('Đã tạo link & copy vào clipboard') } catch(_){ toast('Đã tạo link, bấm Copy bên dưới') }
  } catch(e){ toast('Lỗi tạo share link','error') }
}
async function copyShare(){ if (!S.shareUrl) return; try { await navigator.clipboard.writeText(S.shareUrl); toast('Đã copy link') } catch(_){ toast('Không copy được','error') } }

/* Teacher actions */
async function doOpenStudent(studentId){
  set({ loading:true })
  try {
    const student = S.students.find(s => s.id === studentId) || { id:studentId, name:'Học viên', class_code:'' }
    const [subs, prog] = await Promise.all([ dbLoadStudentSubs(studentId), dbLoadStudentTheory(studentId) ])
    set({ view:'t-student', selStudent:student, selStudentSubs:subs, selStudentProg:prog, loading:false })
  } catch(e){ console.error(e); toast('Lỗi tải hồ sơ HV','error'); set({loading:false}) }
}
async function doOpenReview(studentId, wid, type){
  set({ loading:true })
  try {
    const student = S.students.find(s => s.id === studentId) || S.selStudent || { id:studentId, name:'Học viên' }
    const [subs, savedRev, hls] = await Promise.all([ dbLoadStudentSubs(studentId), dbLoadReview(studentId, wid, type), dbLoadHighlights(studentId, wid, type) ])
    const sub = subs[wid+'-'+type]
    const initRev = { marks:{}, comments:{}, correct_answers:{}, highlights: [] }
    if (savedRev){ Object.assign(initRev.marks, savedRev.marks||{}); Object.assign(initRev.comments, savedRev.comments||{}); Object.assign(initRev.correct_answers, savedRev.correct_answers||{}); initRev.highlights = savedRev.highlights||[] }
    set({ view:'t-review', selStudent:student, selWid:wid, revType:type, selStudentSubs:subs, subs, revAnswers: sub?.answers||{}, revAuto: sub?.auto_marks||{}, rev: initRev, highlights: hls, loading:false })
  } catch(e){ console.error(e); toast('Lỗi tải dữ liệu','error'); set({loading:false}) }
}
async function switchRevType(newType){
  set({ loading:true })
  try {
    const [subs, savedRev, hls] = await Promise.all([ dbLoadStudentSubs(S.selStudent.id), dbLoadReview(S.selStudent.id, S.selWid, newType), dbLoadHighlights(S.selStudent.id, S.selWid, newType) ])
    const sub = subs[S.selWid+'-'+newType]
    const initRev = { marks:{}, comments:{}, correct_answers:{}, highlights: [] }
    if (savedRev){ Object.assign(initRev.marks, savedRev.marks||{}); Object.assign(initRev.comments, savedRev.comments||{}); Object.assign(initRev.correct_answers, savedRev.correct_answers||{}); initRev.highlights = savedRev.highlights||[] }
    set({ revType:newType, selStudentSubs:subs, subs, revAnswers: sub?.answers||{}, revAuto: sub?.auto_marks||{}, rev: initRev, highlights: hls, loading:false })
  } catch(e){ set({loading:false}) }
}
async function backToTeacher(){
  set({ loading:true })
  try { const students = await dbLoadAllStudents(); set({ view:'t-home', students, selStudent:null, selWid:null, loading:false }) } catch(e){ set({loading:false}) }
}
function backFromReview(){ if (S.selStudent) set({ view:'t-student' }); else backToTeacher() }
function setMark(num, v){
  const cur = (S.rev.marks||{})[num]; const next = cur === v ? null : v
  const marks = { ...(S.rev.marks||{}) }; if (next === null) delete marks[num]; else marks[num] = next
  set(p => ({ rev: { ...p.rev, marks } }))
}
function setComment(num, v){ const comments = { ...(S.rev.comments||{}), [num]: v }; set(p => ({ rev: { ...p.rev, comments } })) }
function setCorrect(num, v){ const correct_answers = { ...(S.rev.correct_answers||{}) }; if (v === '') delete correct_answers[num]; else correct_answers[num] = v; set(p => ({ rev: { ...p.rev, correct_answers } })) }

async function doSaveReview(){
  try {
    await dbSaveReview(S.selStudent.id, S.selWid, S.revType, S.rev)
    const week = getWeek(S.selWid); const ex = getEx(week, S.revType)
    const override = { ...S.rev.correct_answers }
    const { marks: autoMarks, score, total } = autoGrade(ex, S.revAnswers, override)
    const finalMarks = { ...autoMarks, ...S.rev.marks }
    let finalScore = 0; Object.values(finalMarks).forEach(m => { if (m === 'correct') finalScore += 1 })
    await dbSubmit(S.selStudent.id, S.selWid, S.revType, S.revAnswers, finalMarks, finalScore, total)
    set(p => ({ revAuto: finalMarks })); toast('Đã lưu nhận xét & cập nhật điểm')
  } catch(e){ console.error(e); toast('Lỗi khi lưu','error') }
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && S.view === 'login') doLogin()
  if (e.key === 'Escape') clearHlToolbar()
})
document.addEventListener('mouseup', () => setTimeout(onMouseUpHighlight, 0))
document.addEventListener('mousedown', e => { if (!e.target.closest('.hl-toolbar')) clearHlToolbar() })

async function init(){
  const params = new URLSearchParams(location.search)
  const token = params.get('share')
  if (token){
    set({ loading:true })
    try {
      const ctx = await dbResolveShareToken(token)
      if (!ctx){ toast('Link không hợp lệ hoặc đã bị xoá','error'); set({loading:false, view:'login'}); return }
      set({ loading:false, view:'login', sharedCtx: ctx })
    } catch(e){ set({loading:false, view:'login'}) }
    return
  }
  render()
}
init()
